<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔐 Auth | PixelLumo</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/fonts.css">
</head>

<body>
  <div id="header"></div>
  <div id="nav"></div>
  <script src="js/layout.js"></script>
  <div class="hero-box">
    <h1 class="glow pink-text">🔐 Login & Register</h1>
    <p>Access your PixelLumo account or create a new one.</p>
  </div>
  <main>
    <div class="centered-box page-flair" style="max-width:400px; margin:auto;">
      <form id="login-form" style="display:flex; flex-direction:column; gap:1em;">
        <h2>Login</h2>
        <label>Email<input type="email" name="email" required></label>
        <label>Password<input type="password" name="password" required></label>
        <button type="submit">Login</button>
        <a href="#" id="show-forgot">Forgot password?</a>
      </form>
      <form id="register-form" style="display:none; flex-direction:column; gap:1em; margin-top:2em;">
        <h2>Register</h2>
        <label>Email<input type="email" name="email" required></label>
        <label>Password<input type="password" name="password" required></label>
        <label>Display Name<input type="text" name="displayName" required></label>
        <button type="submit">Create Account</button>
        <a href="#" id="show-login">Already have an account?</a>
      </form>
      <form id="forgot-form" style="display:none; flex-direction:column; gap:1em; margin-top:2em;">
        <h2>Forgot Password</h2>
        <label>Email<input type="email" name="email" required></label>
        <button type="submit">Send Reset Link</button>
        <a href="#" id="show-login2">Back to login</a>
      </form>
    </div>
  </main>
  <div id="footer"></div>
  <script src="js/auth.js"></script>
  <script>
    // Simple tab logic for forms
    document.getElementById('show-forgot').onclick = e => {
      e.preventDefault();
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('register-form').style.display = 'none';
      document.getElementById('forgot-form').style.display = 'flex';
    };
    document.getElementById('show-login').onclick = e => {
      e.preventDefault();
      document.getElementById('login-form').style.display = 'flex';
      document.getElementById('register-form').style.display = 'none';
      document.getElementById('forgot-form').style.display = 'none';
    };
    document.getElementById('show-login2').onclick = e => {
      e.preventDefault();
      document.getElementById('login-form').style.display = 'flex';
      document.getElementById('register-form').style.display = 'none';
      document.getElementById('forgot-form').style.display = 'none';
    };
  </script>
</body>

</html>
