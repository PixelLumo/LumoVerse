<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - PixelLumo</title>
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="header"></div>
    <div id="nav"></div>
    <script src="js/layout.js"></script>
    <main>
    <h1 class="glow pink-text" style="text-align:center; margin-top:2em;">Sign Up</h1>
    <div class="centered-box" style="max-width:400px;">
        <form id="signup-form" class="form-box" autocomplete="off" style="margin-top:2em;">
            <label for="signup-email" class="form-label">Email</label>
            <input type="email" id="signup-email" name="email" class="form-input" required
                placeholder="Enter your email" autocomplete="off">
            <label for="signup-username" class="form-label">Username</label>
            <input type="text" id="signup-username" name="username" class="form-input" required
                placeholder="Choose a username" autocomplete="off">
            <label for="signup-password" class="form-label">Password</label>
            <div style="position:relative;">
                <input type="password" id="signup-password" name="password" class="form-input" required
                    placeholder="Create a password" autocomplete="off" style="padding-right:2.5em;">
                <button type="button" id="toggle-signup-password" class="show-hide-btn"
                    style="position:absolute; right:0.5em; top:50%; transform:translateY(-50%); background:none; border:none; color:#7c4dff; cursor:pointer; font-size:1em;">Show</button>
            </div>
            <label for="signup-confirm-password" class="form-label">Confirm Password</label>
            <div style="position:relative;">
                <input type="password" id="signup-confirm-password" name="confirm-password" class="form-input" required
                    placeholder="Confirm your password" autocomplete="off" style="padding-right:2.5em;">
                <button type="button" id="toggle-signup-confirm-password" class="show-hide-btn"
                    style="position:absolute; right:0.5em; top:50%; transform:translateY(-50%); background:none; border:none; color:#e040fb; cursor:pointer; font-size:1em;">Show</button>
            </div>
            <button type="button" class="btn-primary"
                style="width:100%; margin-top:1.5em; font-size:1.1em; border-radius:1em; background:linear-gradient(90deg,#e040fb 0%,#7c4dff 100%); color:#fff; box-shadow:0 0 8px #e040fb88;"
                onclick="alert('Signup is currently disabled.')">Sign
                Up</button>
            <div style="text-align:center; margin-top:1em;">
                <a href="login.html" style="color:#7c4dff; text-decoration:underline;">Already have an account? Log
                    in</a>
            </div>
                </form>
                <section class="welcome">
                    <h2>Welcome to PixelLumo</h2>
                    <p>Before you continue, let’s shape your presence.</p>
                    <a href="me.html" class="btn primary">Set up my profile</a>
                </section>
                <script>
            document.getElementById('toggle-signup-password').onclick = function () {
                var pwd = document.getElementById('signup-password');
                if (pwd.type === 'password') {
                    pwd.type = 'text';
                    this.textContent = 'Hide';
                } else {
                    pwd.type = 'password';
                    this.textContent = 'Show';
                }
            };
            document.getElementById('toggle-signup-confirm-password').onclick = function () {
                var pwd = document.getElementById('signup-confirm-password');
                if (pwd.type === 'password') {
                    pwd.type = 'text';
                    this.textContent = 'Hide';
                } else {
                    pwd.type = 'password';
                    this.textContent = 'Show';
                }
            };
        </script>
    </div>
    </main>
    <div id="footer"></div>
</body>

</html>
