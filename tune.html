<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Settings - PixelLumo</title>
	<link rel="stylesheet" href="css/fonts.css">
	<link rel="stylesheet" href="css/style.css">
</head>
<body>
	<div id="header"></div>
	<div id="nav"></div>
	<div id="footer"></div>
	<script src="js/layout.js"></script>
	<div class="hero-box">
		<h1 class="glow pink-text">⚙️ Tune</h1>
		<p style="font-size:1.1rem;">Control your PixelLumo experience</p>
	</div>
	<main>
		<form id="settings-form" class="centered-box page-flair" style="max-width:520px; margin:auto; display:flex; flex-direction:column; gap:2em;">
			<!-- Profile Settings -->
			<section>
				<h2>Profile Settings</h2>
				<label>Display Name<input type="text" name="displayName" required></label>
				<label>Email<input type="email" name="email" required></label>
				<label>Avatar URL<input type="url" name="avatar"></label>
				<label>Bio<textarea name="bio" rows="2"></textarea></label>
			</section>
			<!-- Privacy Controls -->
			<section>
				<h2>Privacy Controls</h2>
				<label>Profile Visibility
					<select name="privacy">
						<option value="public">Public</option>
						<option value="private">Private</option>
						<option value="friends">Friends Only</option>
					</select>
				</label>
			</section>
			<!-- Notification Toggles -->
			<section>
				<h2>Notifications</h2>
				<label>App Notifications
					<select name="notifications">
						<option value="all">All</option>
						<option value="mentions">Mentions Only</option>
						<option value="none">None</option>
					</select>
				</label>
				<label><input type="checkbox" name="emailNotifs"> Email me updates</label>
				<label><input type="checkbox" name="dmNotifs"> Direct message alerts</label>
			</section>
			<!-- Theme Options -->
			<section>
				<h2>Theme</h2>
				<label>Choose Theme
					<select name="theme">
						<option value="auto">Auto</option>
						<option value="light">Light</option>
						<option value="dark">Dark</option>
						<option value="purple">Lumo Purple</option>
					</select>
				</label>
			</section>
			<!-- Security -->
			<section>
				<h2>Security</h2>
				<label>New Password<input type="password" name="newPassword" autocomplete="new-password"></label>
				<label>Confirm Password<input type="password" name="confirmPassword" autocomplete="new-password"></label>
				<label><input type="checkbox" name="enable2fa" disabled> Enable 2FA (coming soon)</label>
			</section>
			<!-- Account Deletion -->
			<section style="border-top:1px solid #fff2; padding-top:1em;">
				<h2 style="color:var(--pink);">Delete Account</h2>
				<p style="color:#fff7;">Permanently remove your account and all data. This action cannot be undone.</p>
				<button type="button" id="delete-account" style="background:#c00; color:#fff;">Delete My Account</button>
			</section>
			<button type="submit" style="margin-top:1em;">Save Changes</button>
		</form>
	</main>
	<div id="footer-placeholder"></div>
	<script type="module">
		import { supabase } from './js/supabase.js'
		import { updateProfile, loadProfile } from './js/profile.js'
		supabase.auth.getUser().then(async ({ data: { user } }) => {
			if (!user) location.href = 'login.html'
			const profile = await loadProfile(user.id)
			const form = document.getElementById('settings-form')
			form.displayName.value = profile.displayName
			form.email.value = user.email
			form.avatar.value = profile.avatar
			form.bio.value = profile.bio
			form.privacy.value = profile.privacy
			form.notifications.value = profile.notifications
			// Optionals
			if (profile.theme) form.theme.value = profile.theme
			if (profile.emailNotifs) form.emailNotifs.checked = true
			if (profile.dmNotifs) form.dmNotifs.checked = true
			form.addEventListener('submit', async e => {
				e.preventDefault()
				await updateProfile(user.id, {
					displayName: form.displayName.value,
					avatar: form.avatar.value,
					bio: form.bio.value,
					privacy: form.privacy.value,
					notifications: form.notifications.value,
					email: form.email.value,
					password: form.newPassword.value,
					theme: form.theme.value,
					emailNotifs: form.emailNotifs.checked,
					dmNotifs: form.dmNotifs.checked
				})
				alert('Profile updated!')
			})
			document.getElementById('delete-account').addEventListener('click', async () => {
				if (confirm('Are you sure you want to permanently delete your account? This cannot be undone.')) {
					// TODO: Implement account deletion logic
					alert('Account deletion coming soon!')
				}
			})
		})
	</script>
</body>
</html>
